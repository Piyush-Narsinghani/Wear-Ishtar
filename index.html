<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>इश्तर</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;700&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af7a;
--dark:#111;
--light:#fafafa;
}

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins;
background:#fafafa;
overflow-x:hidden;
color:#222;
}

/* NAVBAR */

nav{

position:fixed;
top:0;
width:100%;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 8%;

background:rgba(255,255,255,.75);
backdrop-filter:blur(14px);

z-index:1000;

}

.logo{

font-family:'Noto Serif Devanagari';
font-size:36px;

background:linear-gradient(45deg,#c9a25c,#e7d0a0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

letter-spacing:5px;

}

/* HERO */

.hero{

height:100vh;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

background:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
url("https://images.unsplash.com/photo-1611085583191-a3b181a88401");

background-size:cover;
background-position:center;

color:white;

position:relative;

}

/* Hindi watermark */

.watermark{

position:absolute;

font-family:'Noto Serif Devanagari';

font-size:280px;

color:rgba(255,255,255,0.06);

pointer-events:none;

white-space:nowrap;

}

.hero .watermark{
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* HERO TEXT */

.hero h1{

font-size:70px;
font-family:'Playfair Display';

margin-bottom:20px;

}

.hero p{

font-size:20px;
margin-bottom:40px;

}

.btn{

padding:16px 36px;

background:linear-gradient(135deg,#d4af7a,#e8cfa0);

border-radius:40px;

text-decoration:none;
color:white;

box-shadow:0 10px 30px rgba(212,175,122,.5);

transition:.3s;

}

.btn:hover{

transform:translateY(-4px);

}

/* SECTION */

.section{

padding:120px 8%;
text-align:center;
position:relative;

}

.section h2{

font-family:'Playfair Display';
font-size:48px;

margin-bottom:70px;

}

/* GRID */

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:40px;

}

/* PRODUCT CARD */

.card{

background:white;
border-radius:18px;
overflow:hidden;

position:relative;

box-shadow:0 15px 40px rgba(0,0,0,0.08);

transform-style:preserve-3d;

transition:.35s;

}

.card:hover{

box-shadow:0 30px 60px rgba(0,0,0,0.15);

}

.card img{

width:100%;
height:340px;

object-fit:cover;

}

/* Cursor light */

.card::before{

content:"";

position:absolute;
top:0;
left:0;

width:100%;
height:100%;

background:
radial-gradient(circle at var(--x) var(--y),
rgba(255,255,255,.4),
transparent 60%);

opacity:0;

transition:.3s;

}

.card:hover::before{
opacity:1;
}

/* overlay */

.overlay{

position:absolute;
bottom:0;

width:100%;
padding:14px;

background:linear-gradient(transparent,rgba(0,0,0,.7));

color:white;
font-size:13px;

}

/* reveal */

.reveal{

opacity:0;
transform:translateY(80px);

transition:1s cubic-bezier(.19,1,.22,1);

}

.reveal.visible{

opacity:1;
transform:translateY(0);

}

/* CTA */

.cta{

padding:120px;

background:linear-gradient(135deg,#e8d3a5,#d4af7a);

text-align:center;

color:white;

position:relative;

}

.cta h2{

font-family:'Playfair Display';
font-size:48px;

}

.cta a{

margin-top:30px;
display:inline-block;

padding:14px 32px;

background:white;
color:black;

border-radius:40px;

text-decoration:none;

}

/* WhatsApp button */

.whatsapp{

position:fixed;

bottom:30px;
right:30px;

width:60px;
height:60px;

background:#25D366;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:28px;
color:white;

box-shadow:0 15px 30px rgba(0,0,0,0.2);

}

/* Footer */

footer{

padding:80px;

background:#111;

text-align:center;

color:white;

}

.footer-logo{

font-family:'Noto Serif Devanagari';
font-size:60px;

color:var(--gold);

margin-bottom:20px;

}

/* MOBILE */

@media(max-width:800px){

.hero h1{
font-size:40px;
}

.watermark{
font-size:120px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">इश्तर</div>

<div>Luxury Jewelry</div>

</nav>

<section class="hero">

<div class="watermark">इश्तर</div>

<div>

<h1>Find Your Favorite Piece</h1>

<p>Elegant anti-tarnish jewelry for everyday beauty</p>

<a class="btn" href="#shop">Explore Collection</a>

</div>

</section>

<section class="section" id="shop">

<div class="watermark" style="top:30%;left:50%;transform:translateX(-50%);">इश्तर</div>

<h2>Latest Pieces</h2>

<div class="grid" id="productGrid"></div>

</section>

<section class="cta">

<div class="watermark">इश्तर</div>

<h2>Order Your Favorite Piece</h2>

<a href="https://wa.me/91XXXXXXXXXX">Chat on WhatsApp</a>

</section>

<footer>

<div class="footer-logo">इश्तर</div>

<p>Luxury Jewelry</p>

</footer>

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

<script>

/* CSV parser */

function parseCSV(text){

let rows=text.trim().split("\n");
let data=[];

for(let i=1;i<rows.length;i++){

let cols=rows[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(cols){
data.push(cols.map(c=>c.replace(/"/g,"")));
}

}

return data;
}

/* load instagram posts */

fetch("instagram.csv")
.then(r=>r.text())
.then(text=>{

const rows=parseCSV(text);
const grid=document.getElementById("productGrid");

rows.forEach(r=>{

let post=r[0];
let image=r[1];
let type=r[2];

if(image){

let card=document.createElement("div");
card.className="card reveal";

card.innerHTML=`
<a href="${post}" target="_blank">
<img src="${image}">
<div class="overlay">${type}</div>
</a>
`;

grid.appendChild(card);

}

});

/* reveal animation */

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("visible");
}
});

});

document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

/* card tilt + light */

document.querySelectorAll(".card").forEach(card=>{

card.addEventListener("mousemove",e=>{

let rect=card.getBoundingClientRect();

let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let rotateX=(y/rect.height-0.5)*-12;
let rotateY=(x/rect.width-0.5)*12;

card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

card.style.setProperty("--x",x+"px");
card.style.setProperty("--y",y+"px");

});

card.addEventListener("mouseleave",()=>{

card.style.transform="rotateX(0) rotateY(0)";

});

});

});

/* hero parallax */

window.addEventListener("scroll",()=>{

let scroll=window.scrollY;

document.querySelector(".hero").style.backgroundPositionY=
scroll*0.5+"px";

});

</script>

</body>
</html>
